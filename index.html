<!DOCTYPE html>
<html  class="scroll-smooth en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Counter</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
</head>
<body>
  <header>
    <nav class="bg-gradient-to-r from-slate-900 via-indigo-900 to-slate-900 p-4 flex justify-center items-centre text-2xl text-white font-bold">
        <h1>The Foodie</h1>
    </nav>
  </header>
    <main class="bg-gray-200">
        <section>
      <div class="flex justify-center items-center p-10 gap-6">
  <a href="#food-section"
     class="bg-indigo-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg shadow-md transition">
    Add Food
  </a>

  <a href="#food-list-section"
     class="bg-indigo-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg shadow-md transition">
    Remove Food
  </a>

  <a href="#food-list-section"
     class="bg-indigo-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg shadow-md transition">
    Manage Food
  </a>
</div>
        </section>
        <section id="food-section" class="bg-gray-200"">
            <form id="food-form" class="bg-white shadow-lg rounded-xl p-6 max-w-md mx-auto space-y-4">

  <h2 class="text-2xl font-bold text-center text-gray-800">
    Add Food Item
  </h2>
  <div>
    <label for="food-name" class="block text-gray-700 font-medium mb-2">
      Food Name
    </label>

    <input
      type="text"
      id="food-name"
      placeholder="Eggs"
      class="w-full border border-gray-300 rounded-lg px-4 py-2 "
      required
    >
  </div>
  <div>
    <label for="calories" class="block text-gray-700 font-medium mb-2">
      Calories
    </label>

    <input
      type="number"
      id="calories"
      placeholder="70"
      class="w-full border border-gray-300 rounded-lg px-4 py-2 "
      required
    >
  </div>

  <button
    type="submit"
    class="w-full bg-indigo-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg transition duration-200"
  >
    Add Food
  </button>

</form>


        </section>
        <section id="food-list-section">
            <div class="bg-white shadow-lg rounded-xl p-6 max-w-md mx-auto mt-6">

  <h2 class="text-2xl font-bold text-center text-gray-800 mb-4">
    Food List
  </h2>

  <div id="food-list" class="space-y-3">

    <div class="flex justify-between items-center bg-slate-100 p-3 rounded-lg">
      <div>
        <p class="font-semibold">Eggs</p>
        <p class="text-sm text-gray-600">70 Calories</p>
      </div>

      <button
        class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg transition"
      >
        Remove
      </button>
    </div>

  </div>

</div>
        </section>
        <section>
            <div class="bg-indigo-100 rounded-xl p-6 max-w-md mx-auto mt-6 text-center shadow">
  <h2 class="text-xl font-bold text-gray-800">
    Total Calories
  </h2>

  <p id="total-calories" class="text-3xl font-bold text-indigo-700 mt-2">
    0 kcal
  </p>
</div>
        </section>
        <section>
            <div class="max-w-md mx-auto mt-6 mb-8">
  <button
    id="reset-btn"
    class="w-full bg-gray-700 hover:bg-gray-800 text-white font-semibold py-3 rounded-xl transition duration-200"
  >
    Reset Day
  </button>
</div>
        </section>



    </main>
<script src="script.js"></script>    
</body>
</html>
